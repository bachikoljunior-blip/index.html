<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>クッキーゲーム</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg: #1d130d;
      --panel: #332318;
      --panel2: #24170f;
      --text: #fff3df;
      --sub: #dbc6aa;
      --accent: #ffd38a;
      --good: #9cffb2;
      --danger: #6b2525;
      --tab: #4a3020;
      --tabActive: #a7672c;
      --item: #5a3822;
      --itemCanBuy: #7a4a24;
      --itemDone: #31502c;
      --locked: #2b211a;
      --line: rgba(255, 211, 138, 0.30);
      --lineDone: rgba(156, 255, 178, 0.85);
      --lineReady: rgba(255, 211, 138, 0.9);
    }

    html,
    body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% -10%, rgba(255,211,138,0.09), transparent 35%),
        linear-gradient(180deg, #25170f, var(--bg) 50%, #120b07);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      text-align: center;
      user-select: none;
      -webkit-user-select: none;
    }

    body {
      padding: 8px;
    }

    body.skillChoiceMode {
      padding: 0;
    }

    body.skillChoiceMode .game,
    body.skillChoiceMode #goldenCookie,
    body.skillChoiceMode #monsterWrap,
    body.skillChoiceMode #rewardModal {
      display: none !important;
    }

    body.skillChoiceMode #skillChoiceScreen.active {
      display: block;
    }

    .game {
      max-width: 430px;
      height: calc(100dvh - 16px);
      margin: auto;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .top {
      flex: 0 0 auto;
      min-height: 0;
      background:
        radial-gradient(circle at 80% 0%, rgba(255,211,138,0.13), transparent 38%),
        linear-gradient(145deg, #3b281b, var(--panel));
      border-radius: 14px;
      padding: 10px;
      margin: 0 0 8px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.25);
      z-index: 10;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.06);
    }

    h1 {
      font-size: 21px;
      margin: 2px 0 5px;
    }

    h2 {
      font-size: 16px;
      margin: 6px 0;
    }

    .cookieCount {
      width: 100%;
      min-width: 0;
      font-size: clamp(24px, 7.5vw, 32px);
      line-height: 1.05;
      font-weight: 900;
      margin: 2px 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #cookies {
      display: block;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .quotaBox {
      display: block;
      background: #20140d;
      border: 1px solid rgba(255, 211, 138, 0.25);
      border-radius: 12px;
      padding: 6px 7px;
      margin: 6px 0;
      font-size: 12px;
      line-height: 1.35;
      text-align: left;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .quotaBox b {
      color: var(--accent);
    }

    .quotaBad {
      border-color: rgba(255,120,120,0.35);
      color: #ffd0d0;
    }

    .cookieWrap {
      position: relative;
      display: grid;
      place-items: center;
      margin-top: 2px;
      min-height: 145px;
    }

    #cookie {
      position: relative;
      width: 138px;
      height: 138px;
      border: none;
      border-radius: 50%;
      touch-action: manipulation;
      background:
        radial-gradient(circle at 28% 28%, rgba(255,255,255,0.28) 0 12px, transparent 13px),
        radial-gradient(circle at 24% 33%, #6e381b 0 6px, transparent 7px),
        radial-gradient(circle at 64% 26%, #6a3418 0 7px, transparent 8px),
        radial-gradient(circle at 38% 55%, #6a3418 0 8px, transparent 9px),
        radial-gradient(circle at 68% 62%, #6f371a 0 7px, transparent 8px),
        radial-gradient(circle at 55% 77%, #6a3418 0 6px, transparent 7px),
        radial-gradient(circle at 78% 42%, #724020 0 5px, transparent 6px),
        radial-gradient(circle at 50% 50%, #d99a59 0%, #c87d3a 62%, #a85c27 100%);
      box-shadow:
        inset 8px 8px 12px rgba(255,255,255,0.12),
        inset -12px -14px 18px rgba(0,0,0,0.28),
        0 10px 20px rgba(0,0,0,0.35);
      cursor: pointer;
      transition: transform .08s ease, box-shadow .18s ease, filter .18s ease, background .18s ease;
      overflow: hidden;
    }

    #cookie::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background:
        radial-gradient(circle at 33% 25%, rgba(255,255,255,0.20) 0 18px, transparent 19px),
        radial-gradient(circle at 45% 34%, rgba(255,255,255,0.08) 0 22px, transparent 23px);
      pointer-events: none;
    }

    #cookie::after {
      content: "";
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.04);
      pointer-events: none;
    }

    #cookie:active {
      transform: scale(0.95);
    }

    #cookie.boost-all {
      background:
        radial-gradient(circle at 28% 28%, rgba(255,255,255,0.36) 0 12px, transparent 13px),
        radial-gradient(circle at 24% 33%, #8a5a12 0 6px, transparent 7px),
        radial-gradient(circle at 64% 26%, #9a6416 0 7px, transparent 8px),
        radial-gradient(circle at 38% 55%, #8f5815 0 8px, transparent 9px),
        radial-gradient(circle at 68% 62%, #9b6818 0 7px, transparent 8px),
        radial-gradient(circle at 55% 77%, #8d5f15 0 6px, transparent 7px),
        radial-gradient(circle at 78% 42%, #9a6b1c 0 5px, transparent 6px),
        radial-gradient(circle at 50% 50%, #fff2a0 0%, #f4c14a 50%, #d08a18 100%);
      box-shadow:
        0 0 24px rgba(255,215,100,0.95),
        0 0 52px rgba(255,190,80,0.45),
        inset 8px 8px 12px rgba(255,255,255,0.18),
        inset -12px -14px 18px rgba(0,0,0,0.20),
        0 10px 20px rgba(0,0,0,0.35);
      animation: cookieGlow 0.9s ease-in-out infinite alternate;
    }

    #cookie.boost-all .sparkle {
      display: block;
    }

    .sparkle {
      display: none;
      position: absolute;
      inset: 0;
      border-radius: 50%;
      pointer-events: none;
      background:
        radial-gradient(circle at 20% 25%, rgba(255,255,255,0.95) 0 2px, transparent 3px),
        radial-gradient(circle at 74% 22%, rgba(255,255,255,0.9) 0 2px, transparent 3px),
        radial-gradient(circle at 62% 72%, rgba(255,255,255,0.9) 0 2px, transparent 3px),
        radial-gradient(circle at 35% 67%, rgba(255,255,255,0.8) 0 1px, transparent 3px),
        radial-gradient(circle at 50% 42%, rgba(255,255,255,0.8) 0 1px, transparent 3px);
      animation: sparkleMove 0.75s linear infinite;
    }

    @keyframes cookieGlow {
      from { filter: brightness(1); transform: scale(1); }
      to { filter: brightness(1.14); transform: scale(1.025); }
    }

    @keyframes sparkleMove {
      from { opacity: 0.4; transform: rotate(0deg) scale(1); }
      50% { opacity: 1; }
      to { opacity: 0.45; transform: rotate(18deg) scale(1.05); }
    }

    #floatArea {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .float {
      position: absolute;
      left: 50%;
      top: 10px;
      transform: translateX(-50%);
      font-size: 18px;
      font-weight: 900;
      color: var(--accent);
      pointer-events: none;
      animation: rise 0.55s ease-out forwards;
      text-shadow: 0 1px 2px rgba(0,0,0,0.25);
    }

    @keyframes rise {
      to { opacity: 0; transform: translate(-50%, -46px); }
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px;
      margin-top: 7px;
      font-size: 12px;
      min-width: 0;
    }

    .stats div {
      min-width: 0;
      background: var(--panel2);
      border-radius: 9px;
      padding: 6px 4px;
      overflow: hidden;
    }

    .stats b {
      display: block;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #message {
      min-height: 18px;
      margin-top: 5px;
      color: var(--good);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tabs {
      flex: 0 0 auto;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 5px;
      background: transparent;
      padding: 0 0 6px;
      z-index: 5;
      min-height: 46px;
    }

    .tab,
    .mode,
    .item,
    .rewardBtn,
    .startBtn,
    .takeSkillBtn {
      border: none;
      border-radius: 10px;
      background: var(--tab);
      color: var(--text);
      padding: 9px;
      font-size: 12px;
      touch-action: pan-y;
    }

    .tab {
      min-height: 40px;
      display: grid;
      place-items: center;
      line-height: 1;
      overflow: hidden;
      white-space: nowrap;
    }

    .tab.active,
    .mode.active {
      background: var(--tabActive);
      font-weight: 800;
    }

    .tabPages {
      flex: 1 1 auto;
      min-height: 145px;
      overflow-y: auto;
      padding-bottom: 24px;
      -webkit-overflow-scrolling: touch;
    }

    .tabPage {
      display: none;
      background:
        radial-gradient(circle at 20% 0%, rgba(255,211,138,0.08), transparent 30%),
        linear-gradient(150deg, #3a271b, var(--panel));
      border-radius: 14px;
      padding: 10px;
      margin: 0 0 8px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.25);
      border: 1px solid rgba(255,255,255,0.06);
    }

    .tabPage.active {
      display: block;
    }

    .modes {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin-bottom: 8px;
    }

    .mode {
      width: 80px;
    }

    .item {
      display: block;
      width: 100%;
      margin: 7px 0;
      text-align: left;
      background: var(--item);
      font-size: 14px;
    }

    .item.canBuy {
      background: var(--itemCanBuy);
      box-shadow: 0 0 0 2px rgba(255,210,130,0.22);
    }

    .item.locked {
      opacity: 0.45;
    }

    .item.done {
      background: var(--itemDone);
    }

    .artCard {
      position: relative;
      overflow: hidden;
      min-height: 74px;
      padding-right: 88px;
      border: 1px solid rgba(255,255,255,0.07);
      isolation: isolate;
      background:
        linear-gradient(135deg, rgba(255,211,138,0.11), rgba(255,255,255,0.02) 45%),
        linear-gradient(145deg, #654022, #4e301d);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.05),
        0 6px 16px rgba(0,0,0,0.16);
    }

    .artCard.canBuy {
      background:
        linear-gradient(135deg, rgba(255,221,145,0.17), rgba(255,255,255,0.03) 45%),
        linear-gradient(145deg, #825126, #65401f);
    }

    .artCard.done {
      background:
        linear-gradient(135deg, rgba(156,255,178,0.14), rgba(255,255,255,0.03) 45%),
        linear-gradient(145deg, #365b30, #284421);
    }

    .artCard b,
    .artCard .price,
    .artCard .desc {
      position: relative;
      z-index: 2;
    }

    .artCard::before {
      content: attr(data-art);
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 58px;
      line-height: 1;
      color: rgba(255, 230, 180, 0.18);
      font-weight: 900;
      z-index: 1;
      pointer-events: none;
      text-shadow: 0 0 22px rgba(255,211,138,0.18);
    }

    .artCard::after {
      content: "";
      position: absolute;
      right: -30px;
      top: -30px;
      width: 130px;
      height: 130px;
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(255,211,138,0.18), transparent 58%),
        repeating-linear-gradient(35deg, rgba(255,255,255,0.06) 0 2px, transparent 2px 9px);
      opacity: 0.55;
      z-index: 0;
      pointer-events: none;
    }

    .desc {
      color: var(--sub);
      font-size: 12px;
      margin-top: 3px;
    }

    .price {
      color: var(--accent);
      font-weight: 900;
    }

    .infoBox {
      background:
        linear-gradient(145deg, rgba(255,255,255,0.035), rgba(0,0,0,0.07)),
        #24170f;
      border-radius: 12px;
      padding: 9px;
      margin: 8px 0;
      text-align: left;
      font-size: 13px;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .infoBox h3 {
      margin: 0 0 6px;
      font-size: 15px;
      color: var(--accent);
    }

    .infoRow {
      border-top: 1px solid rgba(255,255,255,0.08);
      padding: 7px 0;
    }

    .infoRow:first-child {
      border-top: none;
    }

    .skillSummary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin: 8px 0;
    }

    .skillSummary div {
      background: #24170f;
      border-radius: 10px;
      padding: 7px 4px;
      font-size: 12px;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .debugSwitch {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      background: #402818;
      border-radius: 12px;
      padding: 10px;
      margin: 8px 0;
      text-align: left;
    }

    .debugSwitch input {
      transform: scale(1.25);
    }

    .debugControls {
      display: none;
    }

    .debugControls.active {
      display: block;
    }

    .debugRow {
      display: grid;
      grid-template-columns: 1fr 90px;
      gap: 8px;
      align-items: center;
      padding: 6px 0;
      border-top: 1px solid rgba(255,255,255,0.08);
      font-size: 13px;
    }

    .debugRow input {
      width: 90px;
      border: none;
      border-radius: 8px;
      padding: 7px;
      background: #fff3df;
      color: #20140d;
      font-size: 14px;
      user-select: text;
      -webkit-user-select: text;
    }

    #goldenCookie {
      display: none;
      position: fixed;
      width: 72px;
      height: 72px;
      border: none;
      border-radius: 50%;
      z-index: 999;
      touch-action: pan-y;
      cursor: pointer;
      background:
        radial-gradient(circle at 28% 28%, rgba(255,255,255,0.32) 0 8px, transparent 9px),
        radial-gradient(circle at 24% 33%, #a37117 0 4px, transparent 5px),
        radial-gradient(circle at 64% 26%, #9b6a12 0 5px, transparent 6px),
        radial-gradient(circle at 38% 55%, #a67418 0 6px, transparent 7px),
        radial-gradient(circle at 68% 62%, #94600f 0 5px, transparent 6px),
        radial-gradient(circle at 55% 77%, #a26d16 0 4px, transparent 5px),
        radial-gradient(circle at 50% 50%, #fff1a0 0%, #f2c24d 55%, #d28a12 100%);
      box-shadow:
        0 0 20px rgba(255,215,80,0.85),
        inset 6px 6px 9px rgba(255,255,255,0.18),
        inset -8px -9px 12px rgba(0,0,0,0.22),
        0 10px 20px rgba(0,0,0,0.30);
    }

    #goldenCookie::before {
      content: "";
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,230,120,0.35), transparent 65%);
      pointer-events: none;
    }

    #monsterWrap {
      display: none;
      position: fixed;
      z-index: 998;
      width: 112px;
      text-align: center;
      touch-action: pan-y;
    }

    #cookieMonster {
      position: relative;
      width: 92px;
      height: 92px;
      border: none;
      border-radius: 50%;
      background:
        radial-gradient(circle at 28% 30%, #4b2411 0 5px, transparent 6px),
        radial-gradient(circle at 65% 25%, #512713 0 6px, transparent 7px),
        radial-gradient(circle at 35% 70%, #4f2512 0 6px, transparent 7px),
        radial-gradient(circle at 72% 63%, #5c2d15 0 5px, transparent 6px),
        radial-gradient(circle at 50% 50%, #d4914d 0%, #b7652d 62%, #814018 100%);
      box-shadow:
        0 0 20px rgba(255,120,70,0.35),
        inset 7px 8px 10px rgba(255,255,255,0.12),
        inset -10px -12px 15px rgba(0,0,0,0.30),
        0 10px 20px rgba(0,0,0,0.35);
    }

    #cookieMonster::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background:
        radial-gradient(circle at 34% 32%, #fff8e8 0 8px, transparent 9px),
        radial-gradient(circle at 65% 32%, #fff8e8 0 8px, transparent 9px),
        radial-gradient(circle at 36% 34%, #5b2012 0 4px, transparent 5px),
        radial-gradient(circle at 63% 34%, #5b2012 0 4px, transparent 5px),
        radial-gradient(ellipse at 50% 65%, #7c2c1e 0 12px, transparent 13px);
      pointer-events: none;
    }

    #cookieMonster::after {
      content: "";
      position: absolute;
      left: 33px;
      top: 57px;
      width: 7px;
      height: 10px;
      background: #fff3df;
      clip-path: polygon(0 0, 100% 0, 50% 100%);
      box-shadow:
        10px 2px 0 #fff3df,
        20px 0 0 #fff3df;
      pointer-events: none;
    }

    .monsterHp {
      width: 112px;
      height: 10px;
      background: rgba(0,0,0,0.45);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 5px;
      border: 1px solid rgba(255,255,255,0.18);
    }

    #monsterHpFill {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, #ff6262, #ffd36e);
    }

    #monsterHpText {
      margin-top: 2px;
      font-size: 11px;
      color: #fff;
      text-shadow: 0 1px 2px #000;
      font-weight: 800;
    }

    #rewardModal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 2000;
      padding: 16px;
      align-items: center;
      justify-content: center;
    }

    .rewardPanel {
      width: min(420px, 100%);
      background:
        radial-gradient(circle at 70% 0%, rgba(255,211,138,0.14), transparent 35%),
        var(--panel);
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.10);
    }

    .rewardPanel h2 {
      margin: 0 0 6px;
    }

    .rewardExplain {
      margin: 0 0 10px;
      color: var(--sub);
      font-size: 13px;
      line-height: 1.45;
      text-align: left;
    }

    .rewardBtn {
      display: block;
      width: 100%;
      background: #6b4527;
      margin: 8px 0;
      text-align: left;
      border: 1px solid rgba(255,255,255,0.07);
    }

    .danger {
      background: var(--danger);
    }

    button:disabled {
      opacity: 0.45;
    }

    #skillChoiceScreen {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 5000;
      background:
        radial-gradient(circle at 50% -5%, rgba(255,211,138,0.18), transparent 35%),
        linear-gradient(180deg, #24150d, #100906);
      color: var(--text);
      overflow: auto;
      padding: 10px;
      -webkit-overflow-scrolling: touch;
    }

    #skillChoiceScreen.active {
      display: block;
    }

    .skillScreenInner {
      width: min(1000px, 100%);
      margin: 0 auto;
      padding-bottom: 48px;
    }

    .skillScreenTop {
      position: sticky;
      top: 0;
      z-index: 30;
      background:
        radial-gradient(circle at 75% 0%, rgba(255,211,138,0.18), transparent 35%),
        linear-gradient(145deg, #3c281b, #25170f);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 10px;
      box-shadow: 0 10px 28px rgba(0,0,0,0.42);
      text-align: left;
    }

    .skillScreenTitle {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
    }

    .skillScreenTitle h2 {
      margin: 0;
      color: var(--accent);
      font-size: 18px;
    }

    .skillPointBadge {
      background: #20140d;
      border: 1px solid rgba(255,211,138,0.28);
      border-radius: 999px;
      padding: 6px 9px;
      color: var(--accent);
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .skillScreenGuide {
      color: var(--sub);
      font-size: 12px;
      line-height: 1.45;
      margin-bottom: 8px;
    }

    .selectedSkillPanel {
      background: #20140d;
      border: 1px solid rgba(255,211,138,0.20);
      border-radius: 14px;
      padding: 9px;
      margin-top: 8px;
      min-height: 92px;
    }

    .selectedSkillHead {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      margin-bottom: 4px;
    }

    .selectedSkillName {
      color: var(--accent);
      font-size: 15px;
      font-weight: 900;
    }

    .selectedSkillStatus {
      font-size: 12px;
      background: #3a271b;
      border-radius: 999px;
      padding: 4px 7px;
      white-space: nowrap;
    }

    .selectedSkillDesc {
      color: var(--sub);
      font-size: 12px;
      line-height: 1.45;
      margin-top: 5px;
    }

    .selectedSkillCost {
      color: var(--accent);
      font-size: 12px;
      font-weight: 900;
      margin-top: 5px;
    }

    .skillActionRow {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    .takeSkillBtn,

      font-size: 13px;

    .startBtn {
      background: #31502c;
    }

    .startBtn.locked {
      opacity: 0.42;
      background: var(--locked);
    }

    .skillLegend {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-top: 8px;
      font-size: 11px;
      color: var(--sub);
    }

    .skillLegend div {
      background: rgba(0,0,0,0.18);
      border-radius: 9px;
      padding: 6px 4px;
      text-align: center;
    }

    .skillMapFrame {
      margin-top: 10px;
      background:
        radial-gradient(circle at 50% 0%, rgba(255,211,138,0.10), transparent 34%),
        linear-gradient(180deg, #24170f, #160d08);
      border-radius: 18px;
      border: 1px solid rgba(255,211,138,0.18);
      overflow: auto;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.05),
        0 10px 24px rgba(0,0,0,0.28);
    }

    .skillMap {
      position: relative;
      width: 900px;
      height: 2220px;
      min-width: 900px;
      min-height: 2220px;
      margin: 0 auto;
      background:
        radial-gradient(circle at 50% 15%, rgba(255,211,138,0.08), transparent 28%),
        radial-gradient(circle at 18% 72%, rgba(156,255,178,0.06), transparent 30%),
        radial-gradient(circle at 82% 76%, rgba(255,180,100,0.06), transparent 30%);
    }

    .skillLines {
      position: absolute;
      inset: 0;
      width: 900px;
      height: 2220px;
      pointer-events: none;
    }

    .skillLine {
      stroke: var(--line);
      stroke-width: 3;
      stroke-linecap: round;
    }

    .skillLine.done {
      stroke: var(--lineDone);
      stroke-width: 4;
      filter: drop-shadow(0 0 4px rgba(156,255,178,0.35));
    }

    .skillLine.ready {
      stroke: var(--lineReady);
      stroke-width: 3.5;
      filter: drop-shadow(0 0 4px rgba(255,211,138,0.35));
    }

    .skillNode {
      position: absolute;
      width: 96px;
      height: 72px;
      transform: translate(-50%, -50%);
      border: none;
      border-radius: 16px;
      background:
        linear-gradient(145deg, rgba(255,255,255,0.06), rgba(0,0,0,0.06)),
        #362318;
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 8px 18px rgba(0,0,0,0.32);
      padding: 5px;
      display: grid;
      grid-template-rows: 22px 1fr 13px;
      place-items: center;
      overflow: hidden;
      touch-action: pan-y;
    }

    .skillNode::before {
      content: "";
      position: absolute;
      inset: -20px;
      background: radial-gradient(circle at 50% 20%, rgba(255,211,138,0.18), transparent 55%);
      pointer-events: none;
    }

    .skillNode span {
      position: relative;
      z-index: 1;
    }

    .skillNode.selected {
      outline: 3px solid rgba(255,211,138,0.9);
      outline-offset: 2px;
    }

    .skillNode.done {
      background:
        radial-gradient(circle at 50% 0%, rgba(156,255,178,0.20), transparent 50%),
        #31502c;
      border-color: rgba(156,255,178,0.48);
    }

    .skillNode.canBuy {
      background:
        radial-gradient(circle at 50% 0%, rgba(255,211,138,0.28), transparent 55%),

      border-color: rgba(255,211,138,0.58);
    }

    .skillNode.locked {
      opacity: 0.66;
      background: #241912;
    }

    .nodeMark {
      font-size: 20px;
      line-height: 1;
      color: var(--accent);
      font-weight: 900;
    }

    .nodeName {
      font-size: 10px;
      line-height: 1.05;
      font-weight: 900;
      padding: 0 2px;
    }

    .nodeCost {
      font-size: 10px;
      line-height: 1;
      color: var(--accent);
      font-weight: 800;
    }
  </style>
</head>

function addTap(el, handler) {
  let startX = 0;
  let startY = 0;
  let pointerId = null;
  let moved = false;

  el.addEventListener("pointerdown", e => {
    startX = e.clientX;
    startY = e.clientY;
    pointerId = e.pointerId;
    moved = false;
  });

  el.addEventListener("pointermove", e => {
    if (pointerId !== e.pointerId) return;
    const dx = Math.abs(e.clientX - startX);
    const dy = Math.abs(e.clientY - startY);
    if (dx > 12 || dy > 12) moved = true;
  });

  el.addEventListener("pointerup", e => {
    if (pointerId !== e.pointerId) return;
    const dx = Math.abs(e.clientX - startX);
    const dy = Math.abs(e.clientY - startY);
    pointerId = null;
    if (moved || dx > 12 || dy > 12) return;
    e.preventDefault();
    handler(e);
  });

  el.addEventListener("pointercancel", () => {
    pointerId = null;
    moved = true;
  });
}

function fmtShort(n) {
  n = Number(n) || 0;
  const sign = n < 0 ? "-" : "";
  const abs = Math.abs(n);

  if (abs >= 100) return sign + abs.toFixed(0);
  if (abs >= 10) return sign + abs.toFixed(1).replace(".0", "");
  return sign + abs.toFixed(2).replace(/\.?0+$/, "");
}

function fmt(n) {
  n = Number(n) || 0;
  const abs = Math.abs(n);

  if (abs < 1000) return String(Math.floor(n));
  if (abs < 1000000) return fmtShort(n / 1000) + "K";
  if (abs < 1000000000) return fmtShort(n / 1000000) + "M";
  if (abs < 1000000000000) return fmtShort(n / 1000000000) + "B";
  if (abs < 1000000000000000) return fmtShort(n / 1000000000000) + "T";
  return fmtShort(n / 1000000000000000) + "Qa";
}

function fmtTime(seconds) {
  seconds = Math.max(0, Math.floor(seconds));
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = seconds % 60;

  if (h > 0) return `${h}:${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
  return `${m}:${String(s).padStart(2, "0")}`;
}

function getUpgrade(id) {

function totalSkillCost() {

function maxSkillCost() {

function pausedForSkillChoice() {

function skillEffect(type, target) {
  let total = 0;

  SKILLS.forEach(skill => {
    if (!hasSkill(skill.id)) return;

    (skill.effects || []).forEach(effect => {
      if (effect.type !== type) return;
      if (target && effect.target !== target) return;

      total += Number(effect.value) || 0;
    });
  });

  return total;
}

function hasSkillEffect(type, target) {
  return SKILLS.some(skill => {
    if (!hasSkill(skill.id)) return false;
    return (skill.effects || []).some(effect => {
      if (effect.type !== type) return false;
      if (target && effect.target !== target) return false;
      return true;
    });
  });
}

function totalUpgradeCount() {
  return UPGRADES.reduce((sum, u) => sum + state.upgrades[u.id], 0);
}

function otherUpgradeCount(id) {
  return Math.max(0, totalUpgradeCount() - state.upgrades[id]);
}

function upgradeUnlocked(u) {
  const need = UPGRADE_UNLOCK_SKILLS[u.id];
  return !need || hasSkill(need);
}

function researchUnlocked(r) {
  return !r.skill || hasSkill(r.skill) || hasSkillEffect("unlockResearch", r.id);
}

function highestOwnedUpgradeIndex() {
  let index = -1;

  UPGRADES.forEach((u, i) => {
    if (state.upgrades[u.id] > 0) index = Math.max(index, i);
  });

  return index;
}

function visibleUpgradeLimitIndex() {
  return Math.min(UPGRADES.length - 1, Math.max(1, highestOwnedUpgradeIndex() + 1));
}

function visibleUpgrades() {
  const limit = visibleUpgradeLimitIndex();
  return UPGRADES.filter((u, i) => i <= limit && upgradeUnlocked(u));
}

function goldenMultiplier() {

function upgradeBoostRate(u) {

  const base = Math.max(0.06, 0.22 - index * 0.011);

function upgradePersonalMultiplier(u) {

  return 1 + lv * upgradeBoostRate(u);

function researchUpgradeMultiplier(u) {
  let m = 1;
  const owned = state.upgrades[u.id];

  if (u.id === "grandma" && state.research.grandmaCrowd) {
    m *= 1 + Math.min(4, owned * 0.025);
  }

  if (u.id === "oven" && state.research.ovenBatch) {
    m *= 1 + Math.min(4, owned * 0.020);
  }

  if (u.id === "factory" && state.research.factoryNetwork) {
    m *= 1 + Math.min(5, otherUpgradeCount(u.id) * 0.012);
  }

  if (u.id === "portal" && state.research.portalNetwork) {
    m *= 1 + Math.min(6, otherUpgradeCount(u.id) * 0.007);
  }

  if (u.id === "galaxyFactory" && state.research.galaxyAssembly) {
    m *= 1 + Math.min(7, owned * 0.012);
  }

  if (u.id === "quantumBakery" && state.research.quantumProofing) {
    const upperCount = (state.upgrades.universeOven || 0) + (state.upgrades.cookieSingularity || 0) + (state.upgrades.antimatterOven || 0);
    m *= 1 + Math.min(8, upperCount * 0.018);
  }

  return m;
}

function rawUpgradeContribution(u) {
  return state.upgrades[u.id] * u.value * upgradePersonalMultiplier(u) * researchUpgradeMultiplier(u);
}

function rawUpgradeCps(u) {

  return rawUpgradeContribution(u);
}

function bankClickMultiplier() {
  if (!state.research.bankClickDividend) return 1;

  const bank = getUpgrade("bank");
  const bankCps = rawUpgradeCps(bank);

  return 1 + Math.min(4, Math.sqrt(bankCps) / 220);

function globalResearchMultiplier() {
  let m = 1;

  if (state.research.moonGlobalYeast) {
    const moon = getUpgrade("moonBakery");
    const moonCps = rawUpgradeCps(moon);
    m *= 1 + Math.min(3, Math.sqrt(moonCps) / 650);
  }

  if (state.research.portalGlobalFold) {
    const portal = getUpgrade("portal");
    const portalCps = rawUpgradeCps(portal);
    m *= 1 + Math.min(4, Math.sqrt(portalCps) / 900);
  }

  if (state.research.blackHoleCompression) {
    const blackHole = getUpgrade("blackHoleMixer");
    const blackHoleCps = rawUpgradeCps(blackHole);
    m *= 1 + Math.min(5, Math.sqrt(blackHoleCps) / 1800);
  }

  if (state.research.antimatterRecipe) {
    const antimatter = getUpgrade("antimatterOven");
    const antimatterCps = rawUpgradeCps(antimatter);
    m *= 1 + Math.min(6, Math.sqrt(antimatterCps) / 8000);
  }

  return m;
}

function earn(amount) {
  if (pausedForSkillChoice()) return 0;

  amount = Number(amount);
  if (!Number.isFinite(amount) || amount <= 0) return 0;

  const total = state.cookieRemainder + amount;
  const whole = Math.floor(total);
  state.cookieRemainder = total - whole;

  if (whole <= 0) return 0;

  state.cookies += whole;
  state.totalCookies += whole;
  state.runCookies += whole;

  return whole;
}

function lateMonsterQuotaRaw(s) {
  const progress = (s - 10) / 3590;
  const brake = Math.min(1, Math.pow(s / 1200, 20));

  return (
    Math.pow(s / 10, 1.35) +
    1000000000000000 * Math.pow(progress, 4.2) * brake
  );
}

const MONSTER_Q5 = Math.pow(300 / 10, 1.35) + 1000000;
const MONSTER_Q60 = lateMonsterQuotaRaw(3600);
const MONSTER_LOG_Q5 = Math.log(MONSTER_Q5);
const MONSTER_LOG_Q60 = Math.log(MONSTER_Q60);

function monsterQuotaRequired() {
  const s = Math.max(0, (Date.now() - state.runStart) / 1000);

  if (s < 10) return 0;

  if (s < 300) {
    const t = (s - 10) / 290;

    return Math.max(1, Math.floor(
      Math.pow(s / 10, 1.35) +
      1000000 * Math.pow(t, 2.6)
    ));
  }

  if (s < 3600) {
    const t = (s - 300) / 3300;
    const smooth = t * t * (3 - 2 * t);

    return Math.max(1, Math.floor(
      Math.exp(MONSTER_LOG_Q5 + (MONSTER_LOG_Q60 - MONSTER_LOG_Q5) * smooth)
    ));
  }

  return Math.max(1, Math.floor(lateMonsterQuotaRaw(s)));
}

function monsterQuotaMet() {
  return state.runCookies >= monsterQuotaRequired();
}

function canMonsterAppear() {
  return !pausedForSkillChoice() && monsterQuotaMet();
}

function renderQuota() {
  const box = $("quotaBox");
  const quota = monsterQuotaRequired();
  const ok = monsterQuotaMet();
  const diff = state.runCookies - quota;

  box.classList.toggle("quotaBad", !ok);

  if (pausedForSkillChoice()) {
    box.innerHTML = `
      <b>転生後の準備中</b>
    `;
    return;
  }

  if (ok) {
    box.innerHTML = `
      <b>ノルマ達成中</b>：
      ${fmt(state.runCookies)} / ${fmt(quota)}
      ｜ 経過 ${fmtTime(quotaElapsedSeconds())}
    `;
  } else {
    box.innerHTML = `
      <b>ノルマ未達</b>：
      ${fmt(state.runCookies)} / ${fmt(quota)}
      ｜ 不足 ${fmt(Math.abs(diff))}
    `;
  }
}

function playSound(kind) {
  try {
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    if (!audioCtx) audioCtx = new AudioContext();

    if (kind === "cookie" || kind === "monster") {
      const duration = kind === "monster" ? 0.13 : 0.075;
      const volume = kind === "monster" ? 0.16 : 0.055;

      const bufferSize = Math.floor(audioCtx.sampleRate * duration);
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);

      for (let i = 0; i < bufferSize; i++) {
        const t = i / bufferSize;
        const crack = Math.random() * 2 - 1;
        const decay = Math.pow(1 - t, kind === "monster" ? 2.2 : 3.2);
        data[i] = crack * decay;
      }

      const source = audioCtx.createBufferSource();
      const filter = audioCtx.createBiquadFilter();
      const gain = audioCtx.createGain();

      source.buffer = buffer;
      filter.type = "bandpass";
      filter.frequency.value = kind === "monster" ? 1700 : 2300;
      filter.Q.value = kind === "monster" ? 1.8 : 1.2;

      gain.gain.setValueAtTime(volume, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);

      source.connect(filter);
      filter.connect(gain);
      gain.connect(audioCtx.destination);

      source.start();
      source.stop(audioCtx.currentTime + duration);
      return;
    }

    if (kind === "upgrade") {
      const now = audioCtx.currentTime;

      [420, 630].forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.type = "triangle";
        osc.frequency.value = freq;

        gain.gain.setValueAtTime(0.055, now + i * 0.055);
        gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.055 + 0.12);

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.start(now + i * 0.055);
        osc.stop(now + i * 0.055 + 0.12);
      });

      return;
    }

    if (kind === "golden") {
      const now = audioCtx.currentTime;

      [740, 980, 1320].forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.type = "sine";
        osc.frequency.value = freq;

        gain.gain.setValueAtTime(0.045, now + i * 0.045);
        gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.045 + 0.16);

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.start(now + i * 0.045);
        osc.stop(now + i * 0.045 + 0.16);
      });
    }
  } catch (e) {}
}

function showMessage(text) {
  $("message").textContent = text;
  clearTimeout(showMessage.timer);
  showMessage.timer = setTimeout(() => $("message").textContent = "", 1500);
}

function showFloat(text) {
  const div = document.createElement("div");
  div.className = "float";
  div.textContent = text;
  $("floatArea").appendChild(div);
  setTimeout(() => div.remove(), 600);
}

function updateTopOnly() {
  $("cookies").textContent = fmt(state.cookies);
  $("power").textContent = fmt(currentClickPower());
  $("cps").textContent = pausedForSkillChoice() ? "準備中" : fmt(currentCps());
  $("rank").textContent = rankName();

  $("cookie").classList.toggle("boost-all", Date.now() < boostUntil);

  renderQuota();

  if (monsterVisible) renderMonsterHp();
}

function tapCookie() {
  if (pausedForSkillChoice()) {
    openSkillChoiceScreen();
    return;
  }

  const gained = earn(currentClickPower());

  state.totalClicks += 1;

  playSound("cookie");
  showFloat("+" + fmt(gained));
  updateTopOnly();
}

addTap($("cookie"), tapCookie);

function buyUpgrade(id) {
  if (pausedForSkillChoice()) {
    openSkillChoiceScreen();
    return;
  }

  const u = UPGRADES.find(x => x.id === id);

  if (!upgradeUnlocked(u)) return;

  const target = buyMode === "max" ? Infinity : Number(buyMode);
  let bought = 0;

  while (bought < target) {
    const cost = costOf(u);
    if (!spend(cost)) break;

    state.upgrades[id] += 1;
    bought += 1;

    if (bought > 5000) break;
  }

  if (bought > 0) {
    playSound("upgrade");
    showMessage(`${u.name} ×${bought}`);
    saveGame();
    renderActiveTab();
    updateTopOnly();
  }
}

function buyResearch(id) {
  if (pausedForSkillChoice()) {
    openSkillChoiceScreen();
    return;
  }

  const r = RESEARCH.find(x => x.id === id);

  if (!researchUnlocked(r)) return;
  if (state.research[id]) return;
  if (!spend(researchCost(r))) return;

  state.research[id] = true;

  playSound("upgrade");
  showMessage(`${r.name} 解放`);
  saveGame();
  renderActiveTab();
  updateTopOnly();
}

function skillVisible(skill) {
  if (hasSkill(skill.id)) return true;
  if (skill.prereqs.length === 0) return true;
  return skill.prereqs.some(id => hasSkill(id));
}

function skillCanBuy(skill) {
  if (hasSkill(skill.id)) return false;
  if (!skill.prereqs.every(id => hasSkill(id))) return false;
  return state.prestige >= skill.cost;
}

function selectSkill(id) {
  selectedSkillId = id;
  renderSkillChoiceScreen();
}

function takeSelectedSkill() {
  const skill = getSkill(selectedSkillId);
  if (!skill) return;

  if (hasSkill(skill.id)) return;

  const missing = skill.prereqs.filter(req => !hasSkill(req));
  if (missing.length > 0) return;

  if (state.prestige < skill.cost) return;

  state.prestige -= skill.cost;
  state.skills[skill.id] = true;

  playSound("upgrade");
  saveGame();

  const visibleCanBuy = SKILLS.find(s => skillVisible(s) && skillCanBuy(s));
  selectedSkillId = visibleCanBuy ? visibleCanBuy.id : skill.id;

  renderSkillChoiceScreen();
  updateTopOnly();
}

function openSkillChoiceScreen() {
  document.body.classList.add("skillChoiceMode");
  $("skillChoiceScreen").classList.add("active");
  renderSkillChoiceScreen();

  setTimeout(() => {
    const frame = document.querySelector(".skillMapFrame");
    if (frame) frame.scrollLeft = Math.max(0, ($("skillMap").offsetWidth - frame.clientWidth) / 2);
  }, 0);
}

function closeSkillChoiceScreen() {
  $("skillChoiceScreen").classList.remove("active");
  document.body.classList.remove("skillChoiceMode");
}

function renderSkillChoiceScreen() {
  $("skillScreenPoints").textContent = fmt(state.prestige);

  const visibleSkills = SKILLS.filter(skillVisible);
  const chosenThisTime = boughtSkillCount() > state.skillChoiceStartCount;
  const canStart = pausedForSkillChoice() && chosenThisTime;

  if (!selectedSkillId || !visibleSkills.some(s => s.id === selectedSkillId)) {
    const firstCanBuy = visibleSkills.find(skillCanBuy);
    selectedSkillId = firstCanBuy ? firstCanBuy.id : visibleSkills[0]?.id || null;
  }

  const selected = getSkill(selectedSkillId);
  const selectedDone = selected ? hasSkill(selected.id) : false;
  const selectedCanBuy = selected ? skillCanBuy(selected) : false;

  let statusText = "未選択";
  if (selected) {
    if (selectedDone) statusText = "解放済み";
    else if (selectedCanBuy) statusText = "取得可能";
    else statusText = "前提不足 / PT不足";
  }

  $("selectedSkillPanel").innerHTML = selected ? `
    <div class="selectedSkillHead">
      <div class="selectedSkillName">${selected.icon} ${selected.name}</div>
      <div class="selectedSkillStatus">${statusText}</div>
    </div>
    <div class="selectedSkillCost">消費PT：${fmt(selected.cost)} / 系統：${selected.branchName}</div>
    <div class="selectedSkillDesc">${selected.desc}</div>
    <div class="selectedSkillDesc">前提：${selected.prereqs.length ? selected.prereqs.map(id => getSkill(id)?.name || id).join("、") : "なし"}</div>
  ` : `
    <div class="selectedSkillName">スキルを選択</div>
    <div class="selectedSkillDesc">マークを押すと説明がここに表示されます。</div>
  `;

  const takeBtn = $("takeSelectedSkillBtn");
  takeBtn.classList.toggle("ready", selectedCanBuy);
  takeBtn.textContent = selectedDone ? "解放済み" : selectedCanBuy ? "この効果を取る" : "取得できません";
  takeBtn.disabled = !selectedCanBuy;

  const startBtn = $("skillStartBtn");
  startBtn.classList.toggle("locked", !canStart);
  startBtn.disabled = !canStart;

  const lines = visibleSkills.flatMap(skill => {
    return skill.prereqs.map(reqId => {
      const from = getSkill(reqId);
      if (!from || !skillVisible(from)) return "";

      const done = hasSkill(reqId) && hasSkill(skill.id);
      const ready = hasSkill(reqId) && !hasSkill(skill.id);

      return `
        <line
          class="skillLine ${done ? "done" : ""} ${ready ? "ready" : ""}"
          x1="${from.x}"
          y1="${from.y}"
          x2="${skill.x}"
          y2="${skill.y}"
        />
      `;
    }).join("");
  }).join("");

  const nodes = visibleSkills.map(skill => {
    const done = hasSkill(skill.id);
    const canBuy = skillCanBuy(skill);
    const locked = !done && !canBuy;
    const selectedClass = selectedSkillId === skill.id ? "selected" : "";

    return `
      <button
        class="skillNode ${selectedClass} ${done ? "done" : ""} ${canBuy ? "canBuy" : ""} ${locked ? "locked" : ""}"
        style="left:${skill.x}px; top:${skill.y}px;"
        data-skill-node="${skill.id}"
        aria-label="${skill.name}"
      >
        <span class="nodeMark">${skill.icon}</span>
        <span class="nodeName">${skill.name}</span>
        <span class="nodeCost">${done ? "済" : "PT " + fmt(skill.cost)}</span>
      </button>
    `;
  }).join("");

  $("skillMap").innerHTML = `
    <svg class="skillLines" viewBox="0 0 900 2220" preserveAspectRatio="none">
      ${lines}
    </svg>
    ${nodes}
  `;

  document.querySelectorAll("[data-skill-node]").forEach(btn => {
    addTap(btn, () => selectSkill(btn.dataset.skillNode));
  });
}

addTap($("takeSelectedSkillBtn"), takeSelectedSkill);

addTap($("skillStartBtn"), () => {
  if (!pausedForSkillChoice()) return;

  const chosenThisTime = boughtSkillCount() > state.skillChoiceStartCount;

  if (!chosenThisTime) return;

  state.awaitingSkillChoice = false;
  state.skillChoiceStartCount = boughtSkillCount();
  state.runStart = Date.now();

  closeSkillChoiceScreen();

  const startCookies = Math.floor(skillEffect("startCookies"));
  if (startCookies > 0) earn(startCookies);

  saveGame();
  updateTopOnly();
  renderAllTabs();
  switchTab("shopTab");
  scheduleGoldenCookie();
  scheduleMonster();
  showMessage("周回開始");
});

function upgradeArt(u) {
  const map = {
    finger: "◇",
    grandma: "♧",
    oven: "♨",
    factory: "⚙",
    bank: "⬡",
    portal: "◌",
    moonBakery: "☾",
    timeOven: "◷",
    galaxyFactory: "✺",
    blackHoleMixer: "●",
    universeOven: "◎",
    godFinger: "◆",
    cookieSingularity: "✹",
    quantumBakery: "✺",
    antimatterOven: "✹"
  };

  return map[u.id] || "◎";
}

function researchArt(r) {
  if (r.id.includes("grandma")) return "♧";
  if (r.id.includes("oven")) return "♨";
  if (r.id.includes("factory")) return "⚙";
  if (r.id.includes("portal")) return "◌";
  if (r.id.includes("bank")) return "⬡";
  if (r.id.includes("moon")) return "☾";
  return "⌬";
}

function upgradeShopEffectText(u) {
  const owned = state.upgrades[u.id];
  const before = upgradeEffectiveContribution(u);

  state.upgrades[u.id] = owned + 1;
  const after = upgradeEffectiveContribution(u);
  state.upgrades[u.id] = owned;

  const add = Math.max(0, after - before);
  const kind = u.type === "cps" ? "毎秒" : "タップ";

  return `現在 ${kind} +${fmt(before)} / 次 +${fmt(add)}`;
}

function renderShop() {
  const box = $("shop");
  box.innerHTML = "";

  visibleUpgrades().forEach(u => {
    const cost = costOf(u);
    const btn = document.createElement("button");

    btn.className = "item artCard";
    btn.dataset.art = upgradeArt(u);

    if (state.cookies >= cost && !pausedForSkillChoice()) btn.classList.add("canBuy");

    btn.innerHTML = `
      <b>${u.name}</b>
      <div class="price">${fmt(cost)} クッキー</div>
      <div class="desc">${upgradeShopEffectText(u)} / 所持 ${fmt(state.upgrades[u.id])}</div>
    `;

    addTap(btn, () => buyUpgrade(u.id));
    box.appendChild(btn);
  });
}

function renderResearch() {
  const box = $("research");
  box.innerHTML = "";

  const list = RESEARCH.filter(r => researchUnlocked(r));

  if (list.length === 0) {
    box.innerHTML = `<div class="desc">研究はまだない</div>`;
    return;
  }

  list.forEach(r => {
    const cost = researchCost(r);
    const btn = document.createElement("button");

    btn.className = "item artCard";
    btn.dataset.art = researchArt(r);

    if (!state.research[r.id] && state.cookies >= cost && !pausedForSkillChoice()) btn.classList.add("canBuy");
    if (state.research[r.id]) btn.classList.add("done");

    btn.innerHTML = `
      <b>${r.name}</b>
      <div class="price">${state.research[r.id] ? "解放済み" : fmt(cost) + " クッキー"}</div>
      <div class="desc">${r.desc}</div>
    `;

    addTap(btn, () => buyResearch(r.id));
    box.appendChild(btn);
  });
}

function prestigeGain() {
  const run = Math.max(0, Math.floor(state.runCookies));
  if (run < 1000000) return 0;

  const base = Math.pow(run / 1000000, 0.56);
  const runBonus = 1 + Math.min(1.5, state.prestigeRuns * 0.04);

  return Math.max(1, Math.floor(base * runBonus));
}

function prestigeUnlocked() {
  return state.runCookies >= 1000000 || state.prestigeTotal > 0 || state.prestigeRuns > 0;
}

function renderPrestige() {
  const box = $("prestigePanel");

  if (!prestigeUnlocked()) {
    box.innerHTML = `
      <div class="infoBox">
        <h3>？？？</h3>
        <div class="desc">100万クッキーで解放</div>
      </div>
    `;
    return;
  }

  const canPrestige = state.runCookies >= 1000000 && !pausedForSkillChoice();
  const gain = canPrestige ? prestigeGain() : 0;

  box.innerHTML = `
    <div class="skillSummary">
      <div>所持PT<br><b>${fmt(state.prestige)}</b></div>
      <div>累計PT<br><b>${fmt(state.prestigeTotal)}</b></div>
      <div>解放数<br><b>${boughtSkillCount()} / ${SKILLS.length}</b></div>
    </div>

    <div class="infoBox">
      <h3>転生</h3>
      <div class="infoRow">獲得予定ポイント：+${fmt(gain)}</div>
      <button id="prestigeBtn" class="item ${canPrestige ? "canBuy" : "locked"}">${canPrestige ? "転生する" : "100万クッキーで転生可能"}</button>
      <button id="resetBtn" class="item danger">完全リセット</button>
    </div>
  `;

  const prestigeBtn = $("prestigeBtn");
  if (prestigeBtn) addTap(prestigeBtn, prestigeReset);

  const resetBtn = $("resetBtn");
  if (resetBtn) addTap(resetBtn, completeReset);
}

function upgradeEffectiveContribution(u) {
  let v = rawUpgradeContribution(u);

  if (u.type === "click") {
    v *= bankClickMultiplier();
  }

  v *= u.type === "click" ? clickSkillMultiplier() : cpsSkillMultiplier();
  v *= prestigeMultiplier();
  v *= globalResearchMultiplier();
  v *= goldenBoostMultiplier();
  v *= challengeMultiplier();

  return v;
}

      <div class="infoRow">モンスター出現：${canMonsterAppear() ? "可能" : "ノルマ未達"}</div>

    <div class="infoBox">
      <h3>獲得した報酬</h3>
      ${perkRows || ``}
      ${upgradePerkRows || ``}
      ${(!perkRows && !upgradePerkRows) ? `<div class="desc">まだ報酬なし</div>` : ``}
    </div>

    <div class="infoBox">
      <h3>解放済みアップグレード一覧</h3>

    <label class="debugSwitch">
      <span>
        <b>デバッグ用スイッチ</b>

function renderActiveTab() {
  if (activeTab === "shopTab") renderShop();
  if (activeTab === "researchTab") renderResearch();
  if (activeTab === "prestigeTab") renderPrestige();
  if (activeTab === "infoTab") renderInfo();
}

function renderAllTabs() {
  renderShop();
  renderResearch();
  renderPrestige();
  renderInfo();
}

function switchTab(tabId) {
  activeTab = tabId;

  document.querySelectorAll(".tab").forEach(b => {
    b.classList.toggle("active", b.dataset.tab === tabId);
  });

  document.querySelectorAll(".tabPage").forEach(p => {
    p.classList.toggle("active", p.id === tabId);
  });

  renderActiveTab();
}

function rankName() {
  const t = state.totalCookies;

  if (t >= 1000000000000) return "宇宙";
  if (t >= 1000000000) return "神";
  if (t >= 10000000) return "王";
  if (t >= 1000000) return "大企業";
  if (t >= 100000) return "経営者";
  if (t >= 10000) return "職人";
  if (t >= 1000) return "見習い";

  return "初心者";
}

document.querySelectorAll(".mode").forEach(btn => {

    buyMode = btn.dataset.mode;

    document.querySelectorAll(".mode").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
  });
});

document.querySelectorAll(".tab").forEach(btn => {
  addTap(btn, () => {
    switchTab(btn.dataset.tab);
  });
});

function prestigeReset() {
  if (state.runCookies < 1000000 || pausedForSkillChoice()) return;

  const gain = prestigeGain();

  const keepTotal = state.totalCookies;
  const keepClicks = state.totalClicks;
  const keepPrestige = state.prestige + gain;
  const keepPrestigeTotal = state.prestigeTotal + gain;
  const keepMonsterKills = state.monstersDefeated;
  const keepPrestigeRuns = state.prestigeRuns + 1;
  const keepPerks = state.perks;
  const keepUpgradePerks = state.upgradePerks;
  const keepSkills = state.skills;

  state = freshState();

  state.totalCookies = keepTotal;
  state.totalClicks = keepClicks;
  state.prestige = keepPrestige;
  state.prestigeTotal = keepPrestigeTotal;
  state.prestigeRuns = keepPrestigeRuns;
  state.monstersDefeated = keepMonsterKills;
  state.perks = keepPerks;
  state.upgradePerks = keepUpgradePerks;
  state.skills = keepSkills;
  state.runStart = Date.now();
  state.awaitingSkillChoice = true;
  state.skillChoiceStartCount = boughtSkillCount();

  boostUntil = 0;
  selectedSkillId = null;

  clearTimeout(goldenSpawnTimer);
  clearTimeout(goldenHideTimer);
  clearTimeout(monsterSpawnTimer);
  clearTimeout(monsterHideTimer);
  clearTimeout(rewardOpenTimer);

  goldenVisible = false;
  monsterVisible = false;
  $("goldenCookie").style.display = "none";
  $("monsterWrap").style.display = "none";
  $("rewardModal").style.display = "none";

  playSound("upgrade");
  showMessage(`転生ポイント +${fmt(gain)}`);
  saveGame();
  updateTopOnly();
  renderAllTabs();
  openSkillChoiceScreen();
}

function completeReset() {
  if (!confirm("完全にリセットする？")) return;

  localStorage.removeItem(saveKey);
  oldSaveKeys.forEach(key => localStorage.removeItem(key));

  state = freshState();
  boostUntil = 0;
  selectedSkillId = null;

  clearTimeout(goldenSpawnTimer);
  clearTimeout(goldenHideTimer);
  clearTimeout(monsterSpawnTimer);
  clearTimeout(monsterHideTimer);
  clearTimeout(rewardOpenTimer);

  goldenVisible = false;
  monsterVisible = false;

  $("goldenCookie").style.display = "none";
  $("monsterWrap").style.display = "none";
  $("rewardModal").style.display = "none";
  closeSkillChoiceScreen();

  scheduleGoldenCookie();
  scheduleMonster();

  updateTopOnly();
  renderAllTabs();
  switchTab("shopTab");
}

function saveGame() {
  state.lastSave = Date.now();
  localStorage.setItem(saveKey, JSON.stringify(state));
}

function findSavedData() {
  const current = localStorage.getItem(saveKey);
  if (current) return current;

  for (const oldKey of oldSaveKeys) {
    const oldData = localStorage.getItem(oldKey);

    if (oldData) {
      localStorage.setItem(saveKey, oldData);
      return oldData;
    }
  }

  return null;
}

function loadGame() {
  const raw = findSavedData();

  if (!raw) return;

  try {
    state = JSON.parse(raw);
    ensureState();

    if (!pausedForSkillChoice()) {
      const now = Date.now();
      const baseLimit = OFFLINE_LIMIT_SECONDS;
      const extraLimit = skillEffect("offlineHours") * 60 * 60;
      const seconds = Math.min(Math.max(0, now - state.lastSave) / 1000, baseLimit + extraLimit);
      const gained = earn(baseCps() * seconds);

      if (gained > 0) showMessage(`放置 +${fmt(gained)}`);
    }

    saveGame();
  } catch (e) {
    state = freshState();
  }
}

function scheduleGoldenCookie() {
  clearTimeout(goldenSpawnTimer);

  if (pausedForSkillChoice()) return;
  if (goldenVisible) return;

  const min = 18000;
  const max = 45000;
  const wait = (min + Math.random() * (max - min)) * goldenSpawnFactor();

  goldenSpawnTimer = setTimeout(showGoldenCookie, wait);
}

function scheduleMonster() {
  clearTimeout(monsterSpawnTimer);

  if (pausedForSkillChoice()) return;
  if (monsterVisible) return;

  if (!canMonsterAppear()) {
    monsterSpawnTimer = setTimeout(scheduleMonster, 10000);
    return;
  }

  const level = monsterLevel();
  const min = Math.max(24000, 52000 - level * 600);
  const max = Math.max(42000, 90000 - level * 800);
  const wait = (min + Math.random() * (max - min)) * monsterSpawnFactor();

  monsterSpawnTimer = setTimeout(() => {
    if (canMonsterAppear()) {
      showMonster();
    } else {
      scheduleMonster();
    }
  }, wait);
}

function placeFixedElement(el, size, minY) {
  const pad = 12;
  const vw = window.innerWidth;
  const vh = window.innerHeight;

  const minX = pad;
  const maxX = Math.max(minX, vw - size - pad);
  const maxY = Math.max(minY, vh - size - 24);

  const x = minX + Math.random() * Math.max(1, maxX - minX);
  const y = minY + Math.random() * Math.max(1, maxY - minY);

  el.style.left = x + "px";
  el.style.top = y + "px";
}

function showGoldenCookie() {
  if (pausedForSkillChoice()) return;
  if (goldenVisible) return;

  goldenVisible = true;
  goldenSpawnTimer = null;

  const btn = $("goldenCookie");

  placeFixedElement(btn, 72, 90);

  btn.style.display = "block";

  clearTimeout(goldenHideTimer);
  goldenHideTimer = setTimeout(() => {
    hideGoldenCookie(true);
  }, 8000);
}

function forceGoldenCookie() {
  if (pausedForSkillChoice()) {
    openSkillChoiceScreen();
    return;
  }

  clearTimeout(goldenSpawnTimer);
  clearTimeout(goldenHideTimer);

  goldenVisible = true;
  goldenSpawnTimer = null;

  const btn = $("goldenCookie");

  placeFixedElement(btn, 72, 90);

  btn.style.display = "block";

  goldenHideTimer = setTimeout(() => {
    hideGoldenCookie(true);
  }, 8000);

  showMessage("金クッキーを出現させた");
}

function hideGoldenCookie(shouldReschedule) {
  goldenVisible = false;

  clearTimeout(goldenHideTimer);
  goldenHideTimer = null;

  $("goldenCookie").style.display = "none";

  if (shouldReschedule) scheduleGoldenCookie();
}

function collectGoldenCookie() {
  if (!goldenVisible) return;

  hideGoldenCookie(false);

  const r = Math.random();

  if (r < 0.5) {
    const gained = earn(
      Math.max(100, currentCps() * 60, currentClickPower() * 50) * goldenAmountMultiplier()
    );
    showMessage(`金 +${fmt(gained)}`);
  } else {
    boostUntil = Date.now() + GOLDEN_BOOST_DURATION;
    showMessage(`金: 全生産${goldenMultiplier().toFixed(1)}倍`);
  }

  playSound("golden");
  saveGame();
  updateTopOnly();
  renderActiveTab();
  scheduleGoldenCookie();
}

addTap($("goldenCookie"), collectGoldenCookie);

function monsterLevel() {
  const runLevel = Math.max(1, Math.floor(Math.log10(state.runCookies + 1000)) - 2);
  const prestigeLevel = Math.floor(state.prestigeTotal / 12);
  const killLevel = Math.floor(state.monstersDefeated / 5);

  return Math.max(1, runLevel + prestigeLevel + killLevel);
}

function monsterHpValue(level) {
  const quota = Math.max(1, monsterQuotaRequired());

  let hp =
    20 +
    Math.sqrt(quota + 50) * (0.9 + level * 0.15) +
    Math.pow(level, 1.7) * 12;

  hp *= 1 - Math.min(0.55, skillEffect("monsterHpDown"));

  return Math.floor(hp);
}

function showMonster() {
  if (pausedForSkillChoice()) return;
  if (monsterVisible) return;
  if (!canMonsterAppear()) {
    scheduleMonster();
    return;
  }

  monsterVisible = true;
  monsterSpawnTimer = null;

  const level = monsterLevel();

  monster.level = level;
  monster.maxHp = Math.max(40, monsterHpValue(level));
  monster.hp = monster.maxHp;

  const wrap = $("monsterWrap");

  placeFixedElement(wrap, 112, 120);

  wrap.style.display = "block";
  renderMonsterHp();

  clearTimeout(monsterHideTimer);
  monsterHideTimer = setTimeout(() => {
    hideMonster(true);
  }, 14000);
}

function forceMonster() {
  if (pausedForSkillChoice()) {
    openSkillChoiceScreen();
    return;
  }

  clearTimeout(monsterSpawnTimer);
  clearTimeout(monsterHideTimer);

  monsterVisible = true;
  monsterSpawnTimer = null;

  const level = monsterLevel();

  monster.level = level;
  monster.maxHp = Math.max(40, monsterHpValue(level));
  monster.hp = monster.maxHp;

  const wrap = $("monsterWrap");

  placeFixedElement(wrap, 112, 120);

  wrap.style.display = "block";
  renderMonsterHp();

  monsterHideTimer = setTimeout(() => {
    hideMonster(true);
  }, 14000);

  showMessage("クッキーモンスターを出現させた");
}

function hideMonster(shouldReschedule) {
  monsterVisible = false;

  clearTimeout(monsterHideTimer);
  monsterHideTimer = null;

  $("monsterWrap").style.display = "none";

  if (shouldReschedule) scheduleMonster();
}

function renderMonsterHp() {
  const ratio = Math.max(0, monster.hp / monster.maxHp);
  $("monsterHpFill").style.width = Math.floor(ratio * 100) + "%";
  $("monsterHpText").textContent = `Lv.${fmt(monster.level)} HP ${fmt(monster.hp)} / ${fmt(monster.maxHp)}`;
}

function hitMonster() {
  if (!monsterVisible) return;

  const damage = Math.max(1, Math.floor(monsterBaseDamage() * monsterDamageMultiplier()));

  monster.hp -= damage;

  playSound("monster");
  renderMonsterHp();

  if (monster.hp <= 0) defeatMonster();
}

addTap($("cookieMonster"), hitMonster);

function defeatMonster() {
  const defeatedLevel = monster.level;

  hideMonster(false);

  state.monstersDefeated += 1;

  playSound("golden");
  showMessage("撃破");

  clearTimeout(rewardOpenTimer);
  rewardOpenTimer = setTimeout(() => {
    rewardOpenTimer = null;
    showRewardChoices(defeatedLevel);
  }, 700);

  saveGame();
  updateTopOnly();
  renderActiveTab();
  scheduleMonster();
}

function upgradeRewardDesc(u, count) {
  const percent = upgradeBoostRate(u) * 100 * count;
  return `${u.name}の効果 +${percent.toFixed(1)}%`;
}

function buildMonsterRewardChoices(level) {
  const baseCount = 1 + Math.floor(level / 10);
  const count = Math.max(1, Math.floor(baseCount * (1 + skillEffect("rewardBonus"))));
  const choiceLimit = Math.min(7, 3 + Math.floor(skillEffect("rewardChoices")));

  const coreChoices = REWARD_POOL.map(r => ({
    kind: "perk",
    id: r.id,
    key: "perk:" + r.id,
    name: r.name,
    count,
    desc: r.desc
  }));

  const ownedUpgradeChoices = UPGRADES
    .filter(u => state.upgrades[u.id] > 0 && upgradeUnlocked(u))
    .map(u => ({
      kind: "upgrade",
      id: u.id,
      key: "upgrade:" + u.id,
      name: `${u.name} 強化`,
      count,
      desc: n => upgradeRewardDesc(u, n)
    }));

  const choices = [];

  if (ownedUpgradeChoices.length > 0) {
    choices.push(ownedUpgradeChoices[Math.floor(Math.random() * ownedUpgradeChoices.length)]);
  }

  const restPool = [...coreChoices, ...ownedUpgradeChoices]
    .filter(c => !choices.some(x => x.key === c.key))
    .sort(() => Math.random() - 0.5);

  while (choices.length < choiceLimit && restPool.length > 0) {
    choices.push(restPool.shift());
  }

  return choices;
}

function showRewardChoices(level) {
  pendingRewardChoices = buildMonsterRewardChoices(level);

  const box = $("rewardChoices");
  box.innerHTML = "";

  pendingRewardChoices.forEach(choice => {
    const btn = document.createElement("button");
    btn.className = "rewardBtn";
    btn.innerHTML = `
      <b>${choice.name}</b>
      <div class="desc">${choice.desc(choice.count)}</div>
    `;

    addTap(btn, () => chooseReward(choice));
    box.appendChild(btn);
  });

  $("rewardModal").style.display = "flex";
}

function chooseReward(choice) {
  if (choice.kind === "perk") {
    state.perks[choice.id] += choice.count;
  }

  if (choice.kind === "upgrade") {
    state.upgradePerks[choice.id] += choice.count;
  }

  $("rewardModal").style.display = "none";

  showMessage("報酬を獲得");
  saveGame();
  updateTopOnly();
  renderActiveTab();
}

window.addEventListener("resize", () => {
  if (goldenVisible) placeFixedElement($("goldenCookie"), 72, 90);
  if (monsterVisible) placeFixedElement($("monsterWrap"), 112, 120);
});

loadGame();
ensureState();

updateTopOnly();
renderAllTabs();
switchTab(activeTab);

if (pausedForSkillChoice()) {
  openSkillChoiceScreen();
} else {
  scheduleGoldenCookie();
  scheduleMonster();
}

setInterval(() => {
  if (!pausedForSkillChoice()) {
    earn(currentCps() / 20);
  }

  updateTopOnly();
}, 50);

setInterval(() => {
  if (activeTab !== "infoTab" && document.activeElement.tagName !== "INPUT") {
    renderActiveTab();
  }

  updateTopOnly();
}, 1000);

setInterval(saveGame, 5000);
</script>
</body>
</html>
